<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Interactive Bongo Cat that plays drums when you click or tap">
  <title>Bongo Cat</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <button class="sound-toggle" aria-label="Toggle sound">🔊 Sound On</button>
  
  <h1 class="title" aria-label="Bongo Cat">🎵 Bongo Cat 🎵</h1>
  
  <div class="stage" role="application" aria-label="Bongo Cat drum game">
    <div class="cat">
      <div class="cat-head">
        <div class="ear left"><div class="ear-inner"></div></div>
        <div class="ear right"><div class="ear-inner"></div></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="nose"></div>
        <div class="mouth"></div>
      </div>
      <div class="cat-body">
        <div class="cat-belly"></div>
      </div>
      <div class="paw left"></div>
      <div class="paw right"></div>
    </div>
    
    <div class="drum left">
      <div class="drum-top"></div>
      <div class="drum-base"></div>
    </div>
    <div class="drum right">
      <div class="drum-top"></div>
      <div class="drum-base"></div>
    </div>
    
    <div class="notes"></div>
  </div>
  
  <!-- Mobile control buttons -->
  <div class="mobile-controls">
    <button class="drum-button left-button" data-key="a">A</button>
    <button class="drum-button right-button" data-key="d">D</button>
  </div>
  
  <p class="instructions">Press A or D keys to play!</p>

  <script src="script.js"></script>
</body>
</html>
